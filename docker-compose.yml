name: christmas-ai-canvas

services:
  app:
    image: christmas-ai-canvas-web:local
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_MODE: backend
      API_BASE_URL: /api
      ANALYTICS_GA4_ID: ${ANALYTICS_GA4_ID:-}
      ANALYTICS_BAIDU_ID: ${ANALYTICS_BAIDU_ID:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    image: christmas-ai-canvas-api:local
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-canvas}:${POSTGRES_PASSWORD:-canvas}@postgres:5432/${POSTGRES_DB:-canvas}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-bytes}
      CHANNEL_ENC_KEY: ${CHANNEL_ENC_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-1h}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # 邮箱和对象存储由管理员登录后台后配置，首次启动不依赖 SMTP/S3 服务。
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      REGISTER_GRANT_CREDITS: ${REGISTER_GRANT_CREDITS:-100}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-canvas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canvas}
      POSTGRES_DB: ${POSTGRES_DB:-canvas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
