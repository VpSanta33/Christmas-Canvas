# 圣诞AI画布后端服务编排
# 一键起 Postgres + Redis + api。邮箱和对象存储可登录管理员后台后再配置。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: canvas
      POSTGRES_DB: canvas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://canvas:canvas@postgres:5432/canvas?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      # JWT_SECRET 与 CHANNEL_ENC_KEY 为演示占位，生产务必替换。
      # CHANNEL_ENC_KEY 必须为 64 位 hex（32 字节）。
      JWT_SECRET: "change-me-in-prod-please-32chars-min"
      CHANNEL_ENC_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      CORS_ORIGINS: "http://localhost:3000"
      ALLOW_REGISTRATION: "true"
    ports:
      - "8080:8080"

volumes:
  pgdata:
