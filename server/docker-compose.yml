# 圣诞AI画布后端服务编排
# 一键起 Postgres + Redis + MinIO + api。开发时也可只起前三个依赖，本地 go run api。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: canvas
      POSTGRES_DB: canvas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 开发邮件沙箱：SMTP 1025，网页收件箱 http://localhost:8025。
  # 生产环境请移除该服务，并改用支持 STARTTLS/TLS 的真实 SMTP。
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://canvas:canvas@postgres:5432/canvas?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "canvas"
      S3_USE_SSL: "false"
      # JWT_SECRET 与 CHANNEL_ENC_KEY 为演示占位，生产务必替换。
      # CHANNEL_ENC_KEY 必须为 64 位 hex（32 字节）。
      JWT_SECRET: "change-me-in-prod-please-32chars-min"
      CHANNEL_ENC_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      CORS_ORIGINS: "http://localhost:3000"
      PUBLIC_FILE_BASE_URL: "/api/files/"
      ALLOW_REGISTRATION: "true"
      EMAIL_VERIFICATION_ENABLED: "true"
      EMAIL_VERIFICATION_TTL: "10m"
      EMAIL_VERIFICATION_COOLDOWN: "60s"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_MODE: "none"
      SMTP_FROM_EMAIL: "no-reply@canvas.local"
      SMTP_FROM_NAME: "圣诞AI画布"
    ports:
      - "8080:8080"

volumes:
  pgdata:
  miniodata:
